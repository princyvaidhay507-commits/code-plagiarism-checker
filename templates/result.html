<!-- RESULTS -->
    {% if results %}

        {% for result in results %}

        <div class="result-box">

            <h3>

                {{ result.name1 }}

                VS

                {{ result.name2 }}

            </h3>

            <h2>

                Similarity:
                {{ result.similarity }}%

            </h2>

            <pre>{{ result.diff }}</pre>

        </div>

        {% endfor %}

    {% endif %}
